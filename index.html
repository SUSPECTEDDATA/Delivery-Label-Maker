<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delivery Label Maker</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; background: #f8f9fa; color: #212529; margin: 20px; line-height: 1.5; padding-bottom: 80px; }
        .header { position: relative; margin-bottom: 30px; text-align: center; }
        h1 { margin: 0; font-size: 28px; }
        .cog-btn { background: none; border: none; font-size: 32px; cursor: pointer; padding: 8px; position: absolute; top: 0; right: 0; }
        h3 { margin: 20px 0 8px 0; font-size: 18px; color: #555; }
        button { padding: 15px; font-size: 18px; cursor: pointer; border: none; border-radius: 0; }
        input, textarea { padding: 12px; margin-bottom: 10px; width: 100%; box-sizing: border-box; background: #fff; color: #212529; border: 1px solid #ccc; border-radius: 0; }
        table { width: 100%; border-collapse: collapse; margin: 20px 0; background: #fff; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        .hidden { display: none; }
        #settingsPanel { background: #fff; padding: 20px; border: 2px solid #ddd; margin-top: 20px; border-radius: 8px; }
        .summary-box { background: #fff; padding: 15px; margin: 15px 0; border: 1px solid #ddd; border-radius: 8px; }
        .summary-item { display: flex; justify-content: space-between; background: #f0f0f0; padding: 12px; margin: 6px 0; border-radius: 6px; }
        .total-line { font-weight: bold; background: #e0f0ff; padding: 8px 12px; border-radius: 6px; margin: 8px 0; }
        .action-btn { font-size: 14px; padding: 4px 10px; margin: 0 3px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Delivery Label Maker</h1>
        <button onclick="toggleSettings()" class="cog-btn">⚙️</button>
    </div>

    <h3>Delivery Date</h3>
    <input type="date" id="deliveryDate">

    <h3>Paste Order</h3>
    <textarea id="orderInput" rows="12" placeholder="Paste your order here..."></textarea>

    <button onclick="showHandWriteSummary()" style="width:100%; background:#228B22; color:white; margin:20px 0 30px 0; padding:16px; font-size:18px;">
        Delivery Summary
    </button>

    <div id="handWriteSummary" class="hidden">
        <h2>Delivery Summary</h2>
        <div id="summaryContent"></div>
    </div>

    <!-- Settings Panel -->
    <div id="settingsPanel" class="hidden">
        <h2>Item Settings</h2>
        <table>
            <thead>
                <tr>
                    <th>Code</th>
                    <th>Product Name</th>
                    <th>Shelf Life (days)</th>
                    <th>Labels Per Item</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="itemsList"></tbody>
        </table>

        <h3 id="formTitle">Add New Item</h3>
        Code: <input id="newCode" placeholder="e.g. CHI08"><br>
        Name: <input id="newName" placeholder="e.g. TANDOORI"><br>
        Days: <input id="newDays" type="number" placeholder="10"><br>
        Labels Per Item: <input id="newLabelsPerItem" type="number" value="1"><br><br>
        
        <button onclick="addOrUpdateItem()" id="addUpdateBtn" style="width:100%; background:#228B22;color:white;">Add Item</button>

        <h3 style="margin-top:40px;">Label Settings</h3>
        <p><strong>Current size:</strong> <span id="currentSizeDisplay">40 × 30 mm</span></p>
        
        <button onclick="setPresetSize(50,25)" style="width:100%; margin:8px 0; background:#228B22;color:white;">50 × 25 mm</button>
        <button onclick="setPresetSize(40,30)" style="width:100%; margin:8px 0; background:#228B22;color:white;">40 × 30 mm</button>
    </div>

    <script>
        const excludedCodes = new Set(["SCE01","SCE21","CHE08","PPP03","BAC04"]);
        let currentResults = [];
        let labelWidth = 40;
        let labelHeight = 30;

        let shelfLifeItems = [
            {code:"STR07", name:"STRIPPERS", days:10, labelsPerItem:4},
            {code:"WIN06", name:"WINGS", days:9, labelsPerItem:4},
            {code:"CHI24", name:"TENDERS", days:9, labelsPerItem:1},
            {code:"BEE01", name:"BEEF", days:9, labelsPerItem:1},
            {code:"CHI06", name:"CHICKEN STRIPS", days:9, labelsPerItem:1},
            {code:"SAU16", name:"SAUSAGE", days:6, labelsPerItem:1},
            {code:"MB05", name:"MEATBALLS", days:9, labelsPerItem:1},
            {code:"PAS06", name:"MAC N CHEESE", days:6, labelsPerItem:1},
            {code:"CHE24", name:"STRING CHEESE", days:7, labelsPerItem:1},
            {code:"KK04", name:"KICKERS", days:10, labelsPerItem:1},
            {code:"PW10", name:"WEDGES", days:7, labelsPerItem:4},
            {code:"FT02", name:"WRAPZ", days:22, labelsPerItem:2},
            {code:"NC01", name:"NDUJA", days:12, labelsPerItem:1},
            {code:"CHI23", name:"BONLESS BITES", days:9, labelsPerItem:1},
            {code:"CD09", name:"COOKIES", days:17, labelsPerItem:1},
            {code:"CD23", name:"CREME EGG COOKIES", days:14, labelsPerItem:1},
            {code:"PFR02", name:"FRIES", days:7, labelsPerItem:6},
            {code:"CHI08", name:"TANDOORI", days:10, labelsPerItem:1},
            {code:"TCF07", name:"THIN CRUST 7\"", days:21, labelsPerItem:1},
            {code:"TCF16", name:"THIN CRUST 11.5\"", days:21, labelsPerItem:1},
            {code:"TCF17", name:"THIN CRUST 13.5\"", days:21, labelsPerItem:1}
        ];

        let editingIndex = -1;
        if (localStorage.getItem("shelfLifeItems")) shelfLifeItems = JSON.parse(localStorage.getItem("shelfLifeItems"));
        if (localStorage.getItem("labelSettings")) {
            let ls = JSON.parse(localStorage.getItem("labelSettings"));
            labelWidth = ls.width || 40;
            labelHeight = ls.height || 30;
        }

        function saveItems() { localStorage.setItem("shelfLifeItems", JSON.stringify(shelfLifeItems)); }
        function setPresetSize(w, h) {
            labelWidth = w;
            labelHeight = h;
            localStorage.setItem("labelSettings", JSON.stringify({width: w, height: h}));
            document.getElementById("currentSizeDisplay").innerHTML = w + " × " + h + " mm";
            alert("Label size changed to " + w + " × " + h + " mm");
        }

        function renderItemsList() {
            let html = "";
            for (let i = 0; i < shelfLifeItems.length; i++) {
                let item = shelfLifeItems[i];
                html += "<tr><td>" + item.code + "</td><td>" + item.name + "</td><td>" + item.days + "</td><td>" + item.labelsPerItem + "</td>";
                html += "<td><button class='action-btn' onclick='editItem(" + i + ")' style='background:#08f;color:white;'>Edit</button>";
                html += "<button class='action-btn' onclick='deleteItem(" + i + ")' style='background:#c00;color:white;'>Delete</button></td></tr>";
            }
            document.getElementById("itemsList").innerHTML = html;
        }

        function toggleSettings() {
            var panel = document.getElementById("settingsPanel");
            panel.classList.toggle("hidden");
            if (!panel.classList.contains("hidden")) {
                resetForm();
                renderItemsList();
                document.getElementById("currentSizeDisplay").innerHTML = labelWidth + " × " + labelHeight + " mm";
            }
        }

        function resetForm() {
            editingIndex = -1;
            document.getElementById("formTitle").innerHTML = "Add New Item";
            document.getElementById("addUpdateBtn").innerHTML = "Add Item";
            document.getElementById("newCode").value = "";
            document.getElementById("newName").value = "";
            document.getElementById("newDays").value = "";
            document.getElementById("newLabelsPerItem").value = "1";
        }

        function editItem(index) {
            editingIndex = index;
            let item = shelfLifeItems[index];
            document.getElementById("formTitle").innerHTML = "Edit Item";
            document.getElementById("addUpdateBtn").innerHTML = "Update Item";
            document.getElementById("newCode").value = item.code;
            document.getElementById("newName").value = item.name;
            document.getElementById("newDays").value = item.days;
            document.getElementById("newLabelsPerItem").value = item.labelsPerItem;
        }

        function deleteItem(index) {
            if (confirm("Delete this item permanently?")) {
                shelfLifeItems.splice(index, 1);
                saveItems();
                renderItemsList();
            }
        }

        function addOrUpdateItem() {
            let code = document.getElementById("newCode").value.trim().toUpperCase();
            let name = document.getElementById("newName").value.trim();
            let days = parseInt(document.getElementById("newDays").value);
            let labelsPerItem = parseInt(document.getElementById("newLabelsPerItem").value) || 1;
            if (!code || !name || isNaN(days)) return alert("Please fill all fields");

            if (editingIndex >= 0) shelfLifeItems[editingIndex] = {code, name, days, labelsPerItem};
            else shelfLifeItems.push({code, name, days, labelsPerItem});

            saveItems();
            renderItemsList();
            resetForm();
            alert(editingIndex >= 0 ? "Item updated!" : "Item added!");
        }

        function getDaysAndName(code, product) {
            code = code.toUpperCase().trim();
            if (excludedCodes.has(code)) return null;
            let item = shelfLifeItems.find(i => i.code === code);
            if (item) {
                let name = item.name;
                if (code.startsWith("TCF") || product.toUpperCase().includes("THIN CRUST")) {
                    let size = product.includes("11.5") ? "11.5\"" : product.includes("13.5") ? "13.5\"" : product.includes("7\"") ? "7\"" : "";
                    name = size ? `THIN CRUST ${size}` : name;
                }
                return { days: item.days, name: name, labelsPerItem: item.labelsPerItem || 1 };
            }
            if (code === "CD23" || product.toUpperCase().includes("CREME EGG")) return { days: 14, name: "CREME EGG COOKIES", labelsPerItem: 1 };
            if (code === "PFR02" || product.toUpperCase().includes("FRIES")) return { days: 7, name: "FRIES", labelsPerItem: 6 };
            return null;
        }

        function formatUKDate(d) { return d.toLocaleDateString('en-GB', { day: '2-digit', month: '2-digit', year: '2-digit' }); }
        function getWeekday(d) { return d.toLocaleDateString('en-GB', { weekday: 'long' }); }
        function calculateExpiry(deliveryStr, days) {
            var date = new Date(deliveryStr);
            date.setDate(date.getDate() + days - 1);
            return { date: formatUKDate(date), weekday: getWeekday(date) };
        }

        function parseOrder(text) {
            var lines = text.trim().split('\n').filter(l => l.trim().length > 5);
            var items = [];
            lines.forEach(line => {
                var parts = line.split('\t');
                if (parts.length < 4) parts = line.split(',');
                if (parts.length < 4) parts = line.trim().split(/\s{2,}/);
                if (parts.length < 4) return;
                var code = parts[1].trim().toUpperCase();
                var qty = parseInt(parts[3].trim().replace(/[^0-9]/g, '')) || 1;
                var product = parts[2] ? parts[2].trim() : "";
                items.push({ code, product, qty });
            });
            return items;
        }

        function showHandWriteSummary() {
            var dateInput = document.getElementById("deliveryDate").value;
            var text = document.getElementById("orderInput").value.trim();
            if (!dateInput || !text) return alert("Please select date and paste order");

            var parsed = parseOrder(text);
            var tempResults = [];
            parsed.forEach(item => {
                var info = getDaysAndName(item.code, item.product);
                if (!info) return;
                var expiry = calculateExpiry(dateInput, info.days);
                var printQty = item.qty * (info.labelsPerItem || 1);
                for (var i = 0; i < printQty; i++) {
                    tempResults.push({ product: info.name, date: expiry.date, weekday: expiry.weekday });
                }
            });
            if (tempResults.length === 0) return alert("No items with expiry dates found");

            currentResults = tempResults;

            var groups = {};
            tempResults.forEach(r => {
                var key = r.weekday + " " + r.date;
                if (!groups[key]) groups[key] = { items: {}, total: 0 };
                groups[key].items[r.product] = (groups[key].items[r.product] || 0) + 1;
                groups[key].total++;
            });

            var html = "";
            Object.keys(groups).sort().forEach(key => {
                var group = groups[key];
                html += '<div class="summary-box"><h3 style="color:#0a0;">' + key + '</h3>';
                html += '<p class="total-line">Total: ' + group.total + ' Label' + (group.total === 1 ? '' : 's') + '</p>';
                Object.keys(group.items).sort().forEach(product => {
                    var count = group.items[product];
                    html += '<div class="summary-item"><span>' + product + '</span><span>' + count + ' Label' + (count === 1 ? '' : 's') + '</span></div>';
                });
                html += '</div>';
            });

            html += '<button onclick="downloadPDF()" style="background:#228B22;color:white;width:100%;padding:15px;margin-top:20px;font-size:18px;border-radius:0;">Generate Labels (PDF)</button>';

            document.getElementById("summaryContent").innerHTML = html;
            document.getElementById("handWriteSummary").classList.remove("hidden");
        }

        function downloadPDF() {
            if (!currentResults.length) return alert("No labels to generate");

            const { jsPDF } = window.jspdf;
            const doc = new jsPDF({
                orientation: labelWidth > labelHeight ? "landscape" : "portrait",
                unit: "mm",
                format: [labelWidth, labelHeight]
            });

            currentResults.forEach((label, i) => {
                if (i > 0) doc.addPage([labelWidth, labelHeight]);

                if (labelWidth === 50 && labelHeight === 25) {
                    // =============================================
                    // 50×25 mm – PERFECT as you confirmed
                    // =============================================
                    const abbr = label.weekday.substring(0,3).toUpperCase();

                    doc.setFillColor(0, 0, 0);
                    doc.rect(0, 0, 17.5, 25, "F");

                    doc.setTextColor(255, 255, 255);
                    doc.setFont("helvetica", "bold");
                    doc.setFontSize(17.5);
                    doc.text(abbr, 8.75, 13.5, { align: "center", baseline: "middle" });

                    doc.setTextColor(0, 0, 0);
                    doc.setFontSize(11.2);
                    doc.text(label.product, 20, 7.5, { align: "left", maxWidth: 28 });

                    doc.setTextColor(0, 0, 0);
                    doc.setFontSize(19.8);
                    doc.text(label.date, 20, 19.2, { align: "left" });

                } else if (labelWidth === 40 && labelHeight === 30) {
                    // =============================================
                    // 40×30 mm – EXACTLY the code from the version you pasted
                    // (this produces the layout in your latest screenshot)
                    // =============================================
                    doc.setFont("helvetica", "bold");

                    // Product name (auto-wraps for long names like "CHICKEN STRIPS")
                    doc.setTextColor(0, 0, 0);
                    doc.setFontSize(10.5);
                    doc.text(label.product, 20, 7.8, { align: "center", maxWidth: 36 });

                    // Weekday in red
                    doc.setFontSize(16.5);
                    doc.setTextColor(230, 0, 18);
                    doc.text(label.weekday, 20, 16.2, { align: "center" });

                    // Big black date
                    doc.setFontSize(23.5);
                    doc.setTextColor(0);
                    doc.text(label.date, 20, 24.5, { align: "center" });
                }
            });

            doc.save(`Domino's_Labels_\( {labelWidth}x \){labelHeight}mm.pdf`);
        }

        window.onload = function() {
            document.getElementById("deliveryDate").value = new Date().toISOString().split('T')[0];
            renderItemsList();
        };
    </script>
</body>
</html>
