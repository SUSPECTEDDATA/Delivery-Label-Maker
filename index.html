<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delivery Label Maker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100">
    <div class="max-w-3xl mx-auto p-8">
        <div class="mb-10 flex items-center justify-between">
            <div>
                <h1 class="text-4xl font-bold tracking-tight">Delivery Label Maker</h1>
                <p class="text-emerald-400 font-medium text-lg">Campaign 2 • 50×50mm Labels</p>
            </div>
            <button onclick="toggleSettings()" 
                    class="bg-zinc-800 hover:bg-zinc-700 text-white px-6 py-3 rounded-2xl flex items-center gap-2 text-lg">
                ⚙️ Settings
            </button>
        </div>

        <div class="bg-zinc-900 border border-zinc-800 rounded-3xl shadow-xl p-8">
            <h2 class="text-xl font-semibold mb-6 text-white">Delivery Date</h2>
            <input type="date" id="deliveryDate" class="w-full px-6 py-5 bg-zinc-800 border border-zinc-700 rounded-2xl text-lg focus:outline-none focus:border-emerald-500 text-white">

            <h2 class="text-xl font-semibold mt-10 mb-6 text-white">Paste Order</h2>
            <textarea id="orderInput" rows="12" class="w-full px-6 py-5 bg-zinc-800 border border-zinc-700 rounded-3xl font-mono text-sm resize-y focus:outline-none focus:border-emerald-500 text-white" placeholder="Paste your order here..."></textarea>

            <div class="grid grid-cols-2 gap-4 mt-10">
                <button onclick="processOrder()" class="bg-emerald-600 hover:bg-emerald-500 text-white font-semibold py-5 rounded-2xl text-lg transition">Generate Labels (PDF)</button>
                <button onclick="showHandWriteSummary()" class="bg-zinc-700 hover:bg-zinc-600 text-white font-semibold py-5 rounded-2xl text-lg transition">Delivery Summary</button>
            </div>
        </div>

        <div id="successMessage" class="hidden mt-8 bg-emerald-950 border border-emerald-800 rounded-3xl p-8 text-center">
            <div class="text-6xl mb-4">✅</div>
            <h3 class="text-2xl font-semibold text-white mb-2">Labels Generated!</h3>
            <p class="text-emerald-300 mb-6">Ready for your Niimbot B1.<br>Click below to download the PDF.</p>
            <button onclick="downloadPDF()" class="bg-emerald-600 hover:bg-emerald-500 text-white px-12 py-4 rounded-2xl text-lg font-semibold transition">⬇️ Download Labels PDF</button>
        </div>

        <div id="handWriteSummary" class="hidden mt-8 bg-zinc-900 border border-zinc-800 rounded-3xl shadow-xl p-8">
            <h2 class="text-2xl font-bold mb-6 text-white">Delivery Summary</h2>
            <div id="summaryContent" class="space-y-8"></div>
            
            <div id="summaryPDFButton" class="hidden mt-8 pt-6 border-t border-zinc-700">
                <button onclick="downloadSummaryPDF()" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-semibold py-5 rounded-2xl text-lg transition">⬇️ Export PDF</button>
            </div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div id="settingsModal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-50 p-4">
        <div class="bg-zinc-900 w-full max-w-2xl rounded-3xl overflow-hidden">
            <div class="p-6 border-b border-zinc-700 flex items-center justify-between">
                <h2 class="text-2xl font-bold">Item Settings</h2>
                <button onclick="closeSettings()" class="text-3xl text-zinc-400 hover:text-white">×</button>
            </div>
            
            <div class="p-6 max-h-[60vh] overflow-auto">
                <table class="w-full text-sm">
                    <thead>
                        <tr class="border-b border-zinc-700 text-zinc-400">
                            <th class="text-left py-3">Code</th>
                            <th class="text-left py-3">Product Name</th>
                            <th class="text-left py-3">Shelf Life (days)</th>
                            <th class="w-24"></th>
                        </tr>
                    </thead>
                    <tbody id="modalItemsList"></tbody>
                </table>
            </div>

            <div class="p-6 border-t border-zinc-700 bg-zinc-950">
                <h3 class="font-semibold mb-4" id="modalFormTitle">Add New Item</h3>
                <div class="grid grid-cols-3 gap-4">
                    <input id="modalNewCode" placeholder="Code" class="bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-3">
                    <input id="modalNewName" placeholder="Name" class="bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-3">
                    <input id="modalNewDays" type="number" placeholder="Days" class="bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-3">
                </div>
                <div class="flex gap-4 mt-6">
                    <button onclick="modalAddOrUpdateItem()" id="modalAddUpdateBtn"
                            class="flex-1 bg-emerald-600 hover:bg-emerald-500 py-4 rounded-2xl font-semibold">Add Item</button>
                    <button onclick="closeSettings()" class="flex-1 bg-zinc-700 hover:bg-zinc-600 py-4 rounded-2xl">Close</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const excludedCodes = new Set(["SCE01","SCE21","CHE08","PPP03","BAC04"]);
        let currentResults = [];
        let currentSummaryGroups = {};

        let shelfLifeItems = [
            {code:"STR07", name:"STRIPPERS", days:10},
            {code:"WIN06", name:"WINGS", days:9},
            {code:"CHI24", name:"TENDERS", days:9},
            {code:"BEE01", name:"BEEF", days:9},
            {code:"CHI06", name:"CHICKEN STRIPS", days:9},
            {code:"SAU16", name:"SAUSAGE", days:6},
            {code:"MB05", name:"MEATBALLS", days:9},
            {code:"PAS06", name:"MAC N CHEESE", days:6},
            {code:"CHE24", name:"STRING CHEESE", days:7},
            {code:"KK04", name:"KICKERS", days:10},
            {code:"PW10", name:"WEDGES", days:7},
            {code:"FT02", name:"WRAPZ", days:22},
            {code:"NC01", name:"NDUJA", days:12},
            {code:"CHI23", name:"BONLESS BITES", days:9},
            {code:"CD09", name:"COOKIES", days:17},
            {code:"CD23", name:"CREME EGG COOKIES", days:14},
            {code:"PFR02", name:"FRIES", days:7},
            {code:"CHI08", name:"TANDOORI", days:10}
        ];

        let editingIndex = -1;

        if (localStorage.getItem("shelfLifeItems")) {
            shelfLifeItems = JSON.parse(localStorage.getItem("shelfLifeItems"));
        }

        function saveItems() {
            localStorage.setItem("shelfLifeItems", JSON.stringify(shelfLifeItems));
        }

        function renderModalItemsList() {
            let html = "";
            for (let i = 0; i < shelfLifeItems.length; i++) {
                let item = shelfLifeItems[i];
                html += `<tr class="border-b border-zinc-700 hover:bg-zinc-800">
                    <td class="py-4 px-4">${item.code}</td>
                    <td class="py-4 px-4">${item.name}</td>
                    <td class="py-4 px-4">${item.days}</td>
                    <td class="py-4 px-4 text-right">
                        <button onclick="editItem(${i})" class="text-emerald-400 hover:text-white mr-4">Edit</button>
                        <button onclick="deleteItem(${i})" class="text-red-400 hover:text-white">Delete</button>
                    </td>
                </tr>`;
            }
            document.getElementById("modalItemsList").innerHTML = html;
        }

        function toggleSettings() {
            const modal = document.getElementById("settingsModal");
            modal.classList.toggle("hidden");
            if (!modal.classList.contains("hidden")) {
                resetModalForm();
                renderModalItemsList();
            }
        }

        function closeSettings() {
            document.getElementById("settingsModal").classList.add("hidden");
        }

        function resetModalForm() {
            editingIndex = -1;
            document.getElementById("modalFormTitle").innerHTML = "Add New Item";
            document.getElementById("modalAddUpdateBtn").innerHTML = "Add Item";
            document.getElementById("modalNewCode").value = "";
            document.getElementById("modalNewName").value = "";
            document.getElementById("modalNewDays").value = "";
        }

        function editItem(index) {
            editingIndex = index;
            let item = shelfLifeItems[index];
            document.getElementById("modalFormTitle").innerHTML = "Edit Item";
            document.getElementById("modalAddUpdateBtn").innerHTML = "Update Item";
            document.getElementById("modalNewCode").value = item.code;
            document.getElementById("modalNewName").value = item.name;
            document.getElementById("modalNewDays").value = item.days;
        }

        function deleteItem(index) {
            if (confirm("Delete this item permanently?")) {
                shelfLifeItems.splice(index, 1);
                saveItems();
                renderModalItemsList();
            }
        }

        function modalAddOrUpdateItem() {
            let code = document.getElementById("modalNewCode").value.trim().toUpperCase();
            let name = document.getElementById("modalNewName").value.trim();
            let days = parseInt(document.getElementById("modalNewDays").value);

            if (!code || !name || isNaN(days)) {
                alert("Please fill all fields");
                return;
            }

            if (editingIndex >= 0) {
                shelfLifeItems[editingIndex] = {code, name, days};
            } else {
                shelfLifeItems.push({code, name, days});
            }

            saveItems();
            renderModalItemsList();
            resetModalForm();
            alert(editingIndex >= 0 ? "Item updated!" : "Item added!");
        }

        function formatUKDate(dateStr) {
            const d = new Date(dateStr);
            return d.toLocaleDateString('en-GB', { day: '2-digit', month: '2-digit', year: '2-digit' });
        }

        function getWeekday(dateStr) {
            const d = new Date(dateStr);
            return d.toLocaleDateString('en-GB', { weekday: 'long' });
        }

        function calculateExpiry(deliveryStr, days) {
            const [y, m, d] = deliveryStr.split('-').map(Number);
            const date = new Date(y, m-1, d);
            date.setDate(date.getDate() + days - 1);
            return { date: formatUKDate(date), weekday: getWeekday(date) };
        }

        function parseOrder(text) {
            const lines = text.trim().split('\n').filter(l => l.trim().length > 5);
            const items = [];
            for (let line of lines) {
                let parts = line.split('\t');
                if (parts.length < 4) parts = line.split(',');
                if (parts.length < 4) parts = line.trim().split(/\s{2,}/);
                if (parts.length < 4) continue;
                const code = parts[1].trim().toUpperCase();
                const qtyStr = parts[3].trim().replace(/[^0-9]/g, '') || "1";
                const qty = parseInt(qtyStr) || 1;
                let product = parts[2] ? parts[2].trim() : "";
                items.push({ code, product, qty });
            }
            return items;
        }

        function getDaysAndName(code, product) {
            code = code.toUpperCase().trim();
            if (excludedCodes.has(code)) return null;

            let name = product.split("1x")[0].trim().replace(/ \d+$/, "");

            if (code === "CD23" || product.toUpperCase().includes("CREME EGG") || product.toUpperCase().includes("CRÈME EGG")) {
                name = "CREME EGG COOKIES";
                return { days: 14, name };
            }

            if (code === "PFR02" || product.toUpperCase().includes("FRIES")) {
                name = "FRIES";
                return { days: 7, name };
            }

            if (code === "FT02" || product.toUpperCase().includes("FLOUR TORTILLA")) name = "WRAPZ";
            if (code === "NC01" || product.toUpperCase().includes("NDUJA")) name = "NDUJA";
            if (code === "CHI23" || product.toUpperCase().includes("BONELESS BITES")) name = "BONLESS BITES";
            if (code === "PW10" || product.toUpperCase().includes("WEDGE")) name = "WEDGES";
            if (code === "CD09" || product.toUpperCase().includes("COOKIE DOUGH")) name = "COOKIES";
            if (code === "CHI08" || product.toUpperCase().includes("TANDOORI")) name = "TANDOORI";

            if (code === "STR07") name = "STRIPPERS";
            if (code === "KK04") name = "KICKERS";
            if (code === "WIN06") name = "WINGS";
            if (code === "CHI24") name = "TENDERS";
            if (code === "MB05") name = "MEATBALLS";
            if (code === "BEE01") name = "BEEF";
            if (code === "CHI06") name = "CHICKEN STRIPS";
            if (code === "SAU16") name = "SAUSAGE";
            if (code === "PAS06") name = "MAC N CHEESE";
            if (code === "CHE24") name = "STRING CHEESE";

            if (code === "TCF16" || code === "TCF17" || product.toUpperCase().includes("THIN CRUST")) {
                let size = "";
                if (product.includes("11.5")) size = "11.5\"";
                else if (product.includes("13.5")) size = "13.5\"";
                else if (product.includes("7\"") || product.includes("7 ")) size = "7\"";
                else if (product.includes("9.5")) size = "9.5\"";
                name = size ? `THIN CRUST ${size}` : "THIN CRUST";
            }

            let days = 0;
            if (code === "STR07" || product.toUpperCase().includes("STRIPPERS")) days = 10;
            else if (code === "WIN06" || product.toUpperCase().includes("WINGS")) days = 9;
            else if (code === "CHI24" || product.toUpperCase().includes("TENDERS")) days = 9;
            else if (code === "BEE01") days = 9;
            else if (code === "CHI06" || product.toUpperCase().includes("CHICKEN STRIPS")) days = 9;
            else if (code === "SAU16") days = 6;
            else if (code === "MB05") days = 9;
            else if (code === "PAS06") days = 6;
            else if (code === "CHE24") days = 7;
            else if (code === "TCF16" || code === "TCF17" || product.toUpperCase().includes("THIN CRUST")) days = 21;
            else if (code === "KK04") days = 10;
            else if (code === "PW10" || product.toUpperCase().includes("WEDGE")) days = 7;
            else if (code === "FT02" || product.toUpperCase().includes("FLOUR TORTILLA")) days = 22;
            else if (code === "NC01" || product.toUpperCase().includes("NDUJA")) days = 12;
            else if (code === "CHI23" || product.toUpperCase().includes("BONELESS BITES")) days = 9;
            else if (code === "CD09" || product.toUpperCase().includes("COOKIE DOUGH")) days = 17;
            else if (code === "CD23" || product.toUpperCase().includes("CREME EGG")) days = 14;
            else if (code === "PFR02" || product.toUpperCase().includes("FRIES")) days = 7;
            else if (code === "CHI08" || product.toUpperCase().includes("TANDOORI")) days = 10;

            if (days === 0) return null;
            return { days, name };
        }

        function processOrder() {
            const dateInput = document.getElementById("deliveryDate").value;
            const text = document.getElementById("orderInput").value.trim();
            if (!dateInput) return alert("Select delivery date");
            if (!text) return alert("Paste your order");

            const parsed = parseOrder(text);
            currentResults = [];

            parsed.forEach(item => {
                const info = getDaysAndName(item.code, item.product);
                if (!info) return;
                const expiry = calculateExpiry(dateInput, info.days);
                if (!expiry) return;

                let printQty = item.qty;
                const upper = item.product.toUpperCase();
                const code = item.code;

                if (code === "STR07" || upper.includes("STRIPPERS")) printQty = item.qty * 4;
                else if (code === "WIN06" || upper.includes("WINGS")) printQty = item.qty * 4;
                else if (upper.includes("WEDGES") || code === "PW10") printQty = item.qty * 4;
                else if (code === "PFR02" || upper.includes("FRIES")) printQty = item.qty * 6;
                else if (code === "FT02" || upper.includes("FLOUR TORTILLA")) printQty = item.qty * 2;

                for (let i = 0; i < printQty; i++) {
                    currentResults.push({ product: info.name, date: expiry.date, weekday: expiry.weekday });
                }
            });

            if (currentResults.length === 0) return alert("No items with expiry dates found");
            document.getElementById("successMessage").classList.remove("hidden");
        }

        function downloadPDF() {
            if (!currentResults.length) return;
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF({ orientation: "portrait", unit: "mm", format: [50, 50] });

            currentResults.forEach((label, i) => {
                if (i > 0) doc.addPage([50, 50], "portrait");
                doc.setFont("helvetica", "bold");
                doc.setFontSize(13.5);
                doc.text(label.product, 25, 16, { align: "center", maxWidth: 44 });

                doc.setFontSize(16.5);
                doc.setTextColor(230, 0, 18);
                doc.text(label.weekday, 25, 28, { align: "center" });

                doc.setFontSize(27);
                doc.setTextColor(0);
                doc.text(label.date, 25, 42, { align: "center" });
            });

            doc.save(`Domino's_Labels.pdf`);
        }

        function showHandWriteSummary() {
            const dateInput = document.getElementById("deliveryDate").value;
            const text = document.getElementById("orderInput").value.trim();
            if (!dateInput || !text) return alert("Please select date and paste order first");

            const parsed = parseOrder(text);
            let tempResults = [];

            parsed.forEach(item => {
                const info = getDaysAndName(item.code, item.product);
                if (!info) return;
                const expiry = calculateExpiry(dateInput, info.days);
                if (!expiry) return;

                let printQty = item.qty;
                const upper = item.product.toUpperCase();
                const code = item.code;

                if (code === "STR07" || upper.includes("STRIPPERS")) printQty = item.qty * 4;
                else if (code === "WIN06" || upper.includes("WINGS")) printQty = item.qty * 4;
                else if (upper.includes("WEDGES") || code === "PW10") printQty = item.qty * 4;
                else if (code === "PFR02" || upper.includes("FRIES")) printQty = item.qty * 6;
                else if (code === "FT02" || upper.includes("FLOUR TORTILLA")) printQty = item.qty * 2;

                for (let i = 0; i < printQty; i++) {
                    tempResults.push({ product: info.name, date: expiry.date, weekday: expiry.weekday });
                }
            });

            if (tempResults.length === 0) return alert("No items with expiry dates found");

            const groups = {};
            tempResults.forEach(item => {
                const key = `${item.weekday} ${item.da
